<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>The Office — Agent Dashboard</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap');
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Inter', sans-serif;
      background: #0f172a;
      color: #e2e8f0;
      min-height: 100vh;
    }
    .header {
      background: #1e293b;
      border-bottom: 1px solid #334155;
      padding: 1rem 2rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }
    .header h1 { font-size: 1.4rem; font-weight: 700; }
    .header h1 span { color: #38bdf8; }
    .pipeline-status {
      display: flex; align-items: center; gap: 0.5rem;
      font-size: 0.85rem; color: #94a3b8;
    }
    .dot { width: 10px; height: 10px; border-radius: 50%; background: #475569; }
    .dot.active { background: #22c55e; animation: pulse 1.5s infinite; }
    @keyframes pulse {
      0%, 100% { opacity: 1; box-shadow: 0 0 0 0 rgba(34,197,94,0.4); }
      50% { opacity: 0.8; box-shadow: 0 0 0 8px rgba(34,197,94,0); }
    }

    .brief-bar { max-width: 1400px; margin: 1.5rem auto 0; padding: 0 2rem; }
    .brief-form {
      display: flex; gap: 0.75rem;
      background: #1e293b; border: 1px solid #334155;
      border-radius: 12px; padding: 1rem;
    }
    .brief-form textarea {
      flex: 1; background: #0f172a; border: 1px solid #334155;
      border-radius: 8px; color: #e2e8f0; padding: 0.75rem;
      font-family: inherit; font-size: 0.9rem; resize: none;
      height: 44px; line-height: 1.4;
    }
    .brief-form textarea:focus { outline: none; border-color: #38bdf8; }
    .brief-form textarea::placeholder { color: #475569; }
    .brief-form button {
      background: #38bdf8; color: #0f172a; border: none;
      border-radius: 8px; padding: 0 1.5rem;
      font-weight: 600; font-size: 0.85rem; cursor: pointer; white-space: nowrap;
    }
    .brief-form button:hover { background: #7dd3fc; }
    .brief-form button:disabled { background: #334155; color: #64748b; cursor: not-allowed; }

    .office-floor {
      display: grid;
      grid-template-columns: repeat(6, 1fr);
      grid-template-rows: auto auto;
      gap: 1rem; padding: 1.5rem 2rem;
      max-width: 1400px; margin: 0 auto;
    }
    .desk[data-agent="sub_editor_agent"] {
      grid-column: 4;
      grid-row: 2;
    }
    .desk {
      background: #1e293b; border: 1px solid #334155;
      border-radius: 16px; padding: 1.25rem;
      transition: all 0.3s ease; cursor: pointer;
    }
    .desk:hover { border-color: #475569; transform: translateY(-2px); }
    .desk.working { border-color: #38bdf8; box-shadow: 0 0 20px rgba(56,189,248,0.1); }
    .desk.success { border-color: #22c55e; box-shadow: 0 0 20px rgba(34,197,94,0.1); }
    .desk.error { border-color: #ef4444; box-shadow: 0 0 20px rgba(239,68,68,0.1); }
    .agent-avatar {
      width: 56px; height: 56px; border-radius: 50%;
      background: #334155; display: flex; align-items: center;
      justify-content: center; font-size: 1.6rem;
      margin: 0 auto 0.75rem; position: relative;
    }
    .desk.working .agent-avatar { animation: bob 1s ease-in-out infinite; }
    @keyframes bob { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-4px); } }
    .status-indicator {
      position: absolute; bottom: 2px; right: 2px;
      width: 12px; height: 12px; border-radius: 50%;
      border: 2px solid #1e293b; background: #475569;
    }
    .desk.working .status-indicator { background: #38bdf8; }
    .desk.success .status-indicator { background: #22c55e; }
    .desk.error .status-indicator { background: #ef4444; }
    .agent-name { font-weight: 600; text-align: center; font-size: 0.9rem; margin-bottom: 0.15rem; }
    .agent-title {
      text-align: center; font-size: 0.65rem; color: #64748b;
      text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 0.75rem;
    }
    .speech-bubble {
      background: #334155; border-radius: 10px;
      padding: 0.6rem 0.75rem; font-size: 0.78rem;
      line-height: 1.4; position: relative;
      min-height: 2.5rem; color: #cbd5e1;
    }
    .speech-bubble::before {
      content: ''; position: absolute; top: -7px; left: 50%; transform: translateX(-50%);
      border-left: 7px solid transparent; border-right: 7px solid transparent;
      border-bottom: 7px solid #334155;
    }
    .desk.working .speech-bubble { background: #1e3a5f; }
    .desk.working .speech-bubble::before { border-bottom-color: #1e3a5f; }
    .click-hint {
      text-align: center; font-size: 0.6rem; color: #475569;
      margin-top: 0.5rem; opacity: 0;
      transition: opacity 0.2s;
    }
    .desk:hover .click-hint { opacity: 1; }
    .typing-indicator { display: none; }
    .desk.working .typing-indicator { display: inline; }
    .typing-indicator span {
      display: inline-block; width: 4px; height: 4px;
      border-radius: 50%; background: #38bdf8; margin-left: 2px;
      animation: typing 1.4s infinite;
    }
    .typing-indicator span:nth-child(2) { animation-delay: 0.2s; }
    .typing-indicator span:nth-child(3) { animation-delay: 0.4s; }
    @keyframes typing {
      0%, 60%, 100% { opacity: 0.3; transform: translateY(0); }
      30% { opacity: 1; transform: translateY(-3px); }
    }

    /* Modal */
    .modal-overlay {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,0.7); z-index: 100;
      justify-content: center; align-items: center;
      backdrop-filter: blur(4px);
    }
    .modal-overlay.open { display: flex; }
    .modal {
      background: #1e293b; border: 1px solid #334155;
      border-radius: 20px; padding: 2rem;
      max-width: 500px; width: 90%; max-height: 80vh;
      overflow-y: auto; position: relative;
    }
    .modal-close {
      position: absolute; top: 1rem; right: 1rem;
      background: #334155; border: none; color: #94a3b8;
      width: 32px; height: 32px; border-radius: 50%;
      cursor: pointer; font-size: 1.1rem;
      display: flex; align-items: center; justify-content: center;
    }
    .modal-close:hover { background: #475569; color: #e2e8f0; }
    .modal-header {
      display: flex; align-items: center; gap: 1rem; margin-bottom: 1.5rem;
    }
    .modal-avatar {
      width: 48px; height: 48px; border-radius: 50%;
      background: #334155; display: flex; align-items: center;
      justify-content: center; font-size: 1.4rem;
    }
    .modal-name { font-weight: 700; font-size: 1.1rem; }
    .modal-title { font-size: 0.75rem; color: #64748b; text-transform: uppercase; letter-spacing: 0.05em; }
    .modal-status {
      display: inline-block; padding: 0.15rem 0.5rem;
      border-radius: 9999px; font-size: 0.65rem;
      font-weight: 600; text-transform: uppercase; margin-top: 0.25rem;
    }
    .modal-status.working { background: #1e3a5f; color: #38bdf8; }
    .modal-status.success { background: #14532d; color: #4ade80; }
    .modal-status.error { background: #7f1d1d; color: #fca5a5; }
    .modal-status.idle { background: #334155; color: #64748b; }
    .modal-section { margin-bottom: 1.25rem; }
    .modal-section h3 {
      font-size: 0.7rem; text-transform: uppercase;
      letter-spacing: 0.05em; color: #64748b; margin-bottom: 0.5rem;
    }
    .modal-speech {
      background: #334155; border-radius: 10px;
      padding: 0.75rem 1rem; font-size: 0.85rem;
      line-height: 1.5; color: #cbd5e1;
    }
    .thought-entry {
      background: #0f172a; border-radius: 8px;
      padding: 0.6rem 0.75rem; margin-bottom: 0.5rem;
      font-size: 0.8rem; line-height: 1.5; color: #94a3b8;
      border-left: 3px solid #334155; white-space: pre-wrap;
    }
    .thought-entry .thought-time {
      font-size: 0.65rem; color: #475569;
      font-family: monospace; display: block; margin-bottom: 0.25rem;
    }
    .thought-entry.latest { border-left-color: #38bdf8; color: #cbd5e1; }

    /* Chat */
    .chat-box {
      max-height: 280px; overflow-y: auto;
      margin-bottom: 0.75rem;
      padding: 0.5rem;
      background: #0f172a;
      border-radius: 10px;
      border: 1px solid #1e293b;
    }
    .chat-welcome {
      color: #475569; font-size: 0.8rem;
      text-align: center; padding: 2rem 1rem;
      font-style: italic;
    }
    .chat-loading { color: #475569; font-size: 0.8rem; text-align: center; padding: 1rem; }
    .chat-msg {
      padding: 0.5rem 0.75rem; border-radius: 12px;
      margin-bottom: 0.4rem; font-size: 0.82rem; line-height: 1.5;
      max-width: 85%; position: relative;
      animation: msgIn 0.2s ease;
    }
    @keyframes msgIn {
      from { opacity: 0; transform: translateY(4px); }
      to { opacity: 1; transform: translateY(0); }
    }
    .chat-msg.user {
      background: #1e3a5f; color: #bae6fd;
      margin-left: auto; border-bottom-right-radius: 4px;
    }
    .chat-msg.agent {
      background: #334155; color: #e2e8f0;
      border-bottom-left-radius: 4px;
    }
    .chat-msg.typing {
      background: #334155; padding: 0.75rem;
    }
    .chat-msg-time {
      display: block; font-size: 0.6rem; color: #475569;
      margin-bottom: 0.15rem;
    }
    .chat-msg .kb-badge {
      display: inline-block; font-size: 0.6rem;
      background: #14532d; color: #4ade80;
      padding: 0.1rem 0.4rem; border-radius: 9999px;
      margin-top: 0.3rem;
    }
    .typing-dots span {
      display: inline-block; width: 6px; height: 6px;
      border-radius: 50%; background: #64748b; margin-right: 3px;
      animation: typing 1.4s infinite;
    }
    .typing-dots span:nth-child(2) { animation-delay: 0.2s; }
    .typing-dots span:nth-child(3) { animation-delay: 0.4s; }
    .chat-form {
      display: flex; gap: 0.5rem;
    }
    .chat-input {
      flex: 1; background: #0f172a; border: 1px solid #334155;
      border-radius: 20px; color: #e2e8f0; padding: 0.6rem 1rem;
      font-family: inherit; font-size: 0.82rem;
    }
    .chat-input:focus { outline: none; border-color: #38bdf8; }
    .chat-input::placeholder { color: #475569; }
    .chat-send {
      background: #38bdf8; color: #0f172a; border: none;
      border-radius: 20px; padding: 0.6rem 1.25rem;
      font-weight: 600; font-size: 0.82rem; cursor: pointer;
    }
    .chat-send:hover { background: #7dd3fc; }
    .chat-send:disabled { background: #334155; color: #64748b; cursor: not-allowed; }

    /* Bottom panels */
    .bottom-panel {
      max-width: 1400px; margin: 0 auto;
      padding: 0 2rem 2rem;
      display: grid; grid-template-columns: 1fr 1fr; gap: 1.5rem;
    }
    .panel {
      background: #1e293b; border: 1px solid #334155;
      border-radius: 16px; padding: 1.25rem;
    }
    .panel h2 {
      font-size: 0.8rem; text-transform: uppercase;
      letter-spacing: 0.05em; color: #64748b; margin-bottom: 0.75rem;
    }
    .log-entry {
      display: flex; gap: 0.6rem; padding: 0.4rem 0;
      border-bottom: 1px solid #1e293b; font-size: 0.75rem;
    }
    .log-entry:last-child { border-bottom: none; }
    .log-time { color: #475569; font-family: monospace; white-space: nowrap; }
    .log-agent { color: #38bdf8; font-weight: 500; min-width: 50px; }
    .log-message { color: #94a3b8; }
    .run-entry {
      display: flex; justify-content: space-between; align-items: center;
      padding: 0.5rem 0; border-bottom: 1px solid #1e293b; font-size: 0.78rem;
    }
    .run-entry:last-child { border-bottom: none; }
    .run-topic { color: #e2e8f0; flex: 1; }
    .run-jobs { color: #64748b; margin: 0 0.75rem; font-size: 0.7rem; }
    .run-status {
      padding: 0.15rem 0.5rem; border-radius: 9999px;
      font-size: 0.65rem; font-weight: 600; text-transform: uppercase;
    }
    .run-status.completed { background: #14532d; color: #4ade80; }
    .run-status.published { background: #14532d; color: #4ade80; }
    .run-status.partial { background: #713f12; color: #fbbf24; }
    .run-status.failed, .run-status.review_failed { background: #7f1d1d; color: #fca5a5; }
    .run-status.running { background: #1e3a5f; color: #38bdf8; }
    .activity-log { max-height: 300px; overflow-y: auto; }
    .empty-state { color: #475569; font-size: 0.85rem; text-align: center; padding: 2rem; }

    @media (max-width: 900px) {
      .office-floor { grid-template-columns: repeat(3, 1fr); }
      .bottom-panel { grid-template-columns: 1fr; }
    }
    @media (max-width: 600px) { .office-floor { grid-template-columns: repeat(2, 1fr); } }
  </style>
</head>
<body>

<div class="header">
  <h1>🏢 <span>The Office</span> — Agent Dashboard</h1>
  <div class="pipeline-status">
    <div class="dot" id="pipeline-dot"></div>
    <span id="pipeline-label">Pipeline idle</span>
  </div>
</div>

<div class="brief-bar">
  <form class="brief-form" id="brief-form" onsubmit="return submitBrief(event)">
    <textarea id="brief-input" placeholder="Give the team a brief... e.g. 'Write 3 articles about UK casino bonuses, responsible gambling, and how slots work'" rows="1"></textarea>
    <button type="submit" id="brief-btn">Send Brief</button>
  </form>
</div>

<div class="office-floor" id="office-floor"></div>

<!-- Agent detail modal -->
<div class="modal-overlay" id="modal-overlay" onclick="closeModal(event)">
  <div class="modal" id="modal" onclick="event.stopPropagation()">
    <button class="modal-close" onclick="document.getElementById('modal-overlay').classList.remove('open')">&times;</button>
    <div id="modal-content"></div>
  </div>
</div>

<div class="bottom-panel">
  <div class="panel">
    <h2>Activity Log</h2>
    <div class="activity-log" id="activity-log">
      <div class="empty-state">No activity yet — send a brief to get the office moving.</div>
    </div>
  </div>
  <div class="panel">
    <h2>Pipeline Runs</h2>
    <div id="runs-list">
      <div class="empty-state">No completed runs yet.</div>
    </div>
  </div>
</div>

<script>
const AGENTS_ORDER = ['manager_agent', 'seo_agent', 'writer_agent', 'editor_agent', 'compliance_agent', 'publisher_agent', 'sub_editor_agent'];
let currentState = {};

function renderAgents(agents) {
  const floor = document.getElementById('office-floor');
  floor.innerHTML = '';
  AGENTS_ORDER.forEach(key => {
    const a = agents[key];
    if (!a) return;
    const thoughtCount = (a.thoughts || []).length;
    const desk = document.createElement('div');
    desk.className = `desk ${a.status}`;
    desk.dataset.agent = key;
    desk.onclick = () => openModal(key, agents);
    desk.innerHTML = `
      <div class="agent-avatar">
        ${a.emoji}
        <div class="status-indicator"></div>
      </div>
      <div class="agent-name">${a.name}</div>
      <div class="agent-title">${a.title}</div>
      <div class="speech-bubble">
        ${a.speech}
        <span class="typing-indicator"><span></span><span></span><span></span></span>
      </div>
      <div class="click-hint">${thoughtCount ? `Click — ${thoughtCount} thought${thoughtCount > 1 ? 's' : ''}` : 'Click to view'}</div>
    `;
    floor.appendChild(desk);
  });
}

function openModal(agentKey, agents) {
  const a = agents[agentKey];
  if (!a) return;
  const thoughts = a.thoughts || [];
  const mc = document.getElementById('modal-content');
  mc.innerHTML = `
    <div class="modal-header">
      <div class="modal-avatar">${a.emoji}</div>
      <div>
        <div class="modal-name">${a.name}</div>
        <div class="modal-title">${a.title}</div>
        <div class="modal-status ${a.status}">${a.status}</div>
      </div>
    </div>
    <div class="modal-section">
      <h3>Currently saying</h3>
      <div class="modal-speech">${a.speech}</div>
    </div>
    <div class="modal-section">
      <h3>Chat with ${a.name}</h3>
      <div class="chat-box" id="chat-box-${agentKey}"><div class="chat-loading">Loading...</div></div>
      <form class="chat-form" onsubmit="return sendChat(event, '${agentKey}')">
        <input type="text" class="chat-input" id="chat-input-${agentKey}" placeholder="Message ${a.name}..." autocomplete="off">
        <button type="submit" class="chat-send">Send</button>
      </form>
    </div>
    <div class="modal-section">
      <h3>Thought process ${thoughts.length ? `(${thoughts.length})` : ''}</h3>
      ${thoughts.length
        ? thoughts.map((t, i) => `
          <div class="thought-entry ${i === 0 ? 'latest' : ''}">
            <span class="thought-time">${t.time}</span>
            ${t.text}
          </div>
        `).join('')
        : '<div class="empty-state" style="padding:1rem">No thoughts yet — waiting for work.</div>'
      }
    </div>
  `;
  document.getElementById('modal-overlay').classList.add('open');
  loadChatHistory(agentKey);
  setTimeout(() => {
    const input = document.getElementById(`chat-input-${agentKey}`);
    if (input) input.focus();
  }, 100);
}

function closeModal(e) {
  if (e.target === document.getElementById('modal-overlay')) {
    document.getElementById('modal-overlay').classList.remove('open');
  }
}

// Close on Escape
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') document.getElementById('modal-overlay').classList.remove('open');
});

function renderLog(log) {
  const el = document.getElementById('activity-log');
  if (!log || !log.length) {
    el.innerHTML = '<div class="empty-state">No activity yet — send a brief to get the office moving.</div>';
    return;
  }
  el.innerHTML = log.map(e => `
    <div class="log-entry">
      <span class="log-time">${e.time}</span>
      <span class="log-agent">${e.agent}</span>
      <span class="log-message">${e.message}</span>
    </div>
  `).join('');
}

function renderRuns(runs) {
  const el = document.getElementById('runs-list');
  if (!runs || !runs.length) {
    el.innerHTML = '<div class="empty-state">No completed runs yet.</div>';
    return;
  }
  el.innerHTML = runs.map(r => `
    <div class="run-entry">
      <span class="run-topic">${r.topic || 'Unknown'}</span>
      ${r.jobs ? `<span class="run-jobs">${r.jobs} job(s)</span>` : ''}
      <span class="run-status ${r.status || ''}">${r.status || '?'}</span>
    </div>
  `).join('');
}

function updatePipelineStatus(state) {
  const dot = document.getElementById('pipeline-dot');
  const label = document.getElementById('pipeline-label');
  const btn = document.getElementById('brief-btn');
  if (state.pipeline_running) {
    dot.classList.add('active');
    label.textContent = `Working on: ${state.current_topic || '...'}`;
    btn.disabled = true; btn.textContent = 'Running...';
  } else {
    dot.classList.remove('active');
    label.textContent = 'Pipeline idle';
    btn.disabled = false; btn.textContent = 'Send Brief';
  }
}

async function poll() {
  try {
    const res = await fetch('/api/state');
    currentState = await res.json();
    renderAgents(currentState.agents);
    renderLog(currentState.activity_log);
    renderRuns(currentState.runs);
    updatePipelineStatus(currentState);
    // Auto-refresh modal if open
    const overlay = document.getElementById('modal-overlay');
    if (overlay.classList.contains('open')) {
      const mc = document.getElementById('modal-content');
      const nameEl = mc.querySelector('.modal-name');
      if (nameEl) {
        const openAgent = AGENTS_ORDER.find(k => currentState.agents[k]?.name === nameEl.textContent);
        if (openAgent) openModal(openAgent, currentState.agents);
      }
    }
  } catch (e) {}
}

async function loadChatHistory(agentKey) {
  const box = document.getElementById(`chat-box-${agentKey}`);
  if (!box) return;
  try {
    const res = await fetch(`/api/chat/history/${agentKey}`);
    const history = await res.json();
    box.innerHTML = '';
    if (history.length === 0) {
      const name = currentState.agents[agentKey]?.name || 'this agent';
      box.innerHTML = `<div class="chat-welcome">Start a conversation with ${name} — give feedback, ask questions, or just chat.</div>`;
    } else {
      history.forEach(h => {
        const cls = h.role === 'user' ? 'user' : 'agent';
        let html = `<div class="chat-msg ${cls}"><span class="chat-msg-time">${h.time || ''}</span>${h.content}`;
        if (h.kb_updated) html += `<br><span class="kb-badge">Remembered</span>`;
        html += `</div>`;
        box.innerHTML += html;
      });
    }
    box.scrollTop = box.scrollHeight;
  } catch (e) {
    box.innerHTML = '<div class="chat-welcome">Chat unavailable.</div>';
  }
}

async function sendChat(e, agentKey) {
  e.preventDefault();
  const input = document.getElementById(`chat-input-${agentKey}`);
  const box = document.getElementById(`chat-box-${agentKey}`);
  const btn = e.target.querySelector('.chat-send');
  const msg = input.value.trim();
  if (!msg) return false;

  // Remove welcome message if present
  const welcome = box.querySelector('.chat-welcome');
  if (welcome) welcome.remove();

  box.innerHTML += `<div class="chat-msg user"><span class="chat-msg-time">now</span>${msg}</div>`;
  input.value = '';
  input.disabled = true;
  btn.disabled = true;
  btn.textContent = '...';
  box.scrollTop = box.scrollHeight;

  // Typing indicator
  const typingId = 'typing-' + Date.now();
  box.innerHTML += `<div class="chat-msg agent typing" id="${typingId}"><span class="typing-dots"><span></span><span></span><span></span></span></div>`;
  box.scrollTop = box.scrollHeight;

  try {
    const res = await fetch('/api/chat', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({ agent: agentKey, message: msg })
    });
    const data = await res.json();
    document.getElementById(typingId)?.remove();

    if (data.error) {
      box.innerHTML += `<div class="chat-msg agent">Something went wrong: ${data.error}</div>`;
    } else {
      let html = `<div class="chat-msg agent"><span class="chat-msg-time">now</span>${data.reply}`;
      if (data.knowledge_updated) html += `<br><span class="kb-badge">Remembered</span>`;
      html += `</div>`;
      box.innerHTML += html;
    }
  } catch (err) {
    document.getElementById(typingId)?.remove();
    box.innerHTML += `<div class="chat-msg agent">Connection error.</div>`;
  }

  input.disabled = false;
  btn.disabled = false;
  btn.textContent = 'Send';
  input.focus();
  box.scrollTop = box.scrollHeight;
  return false;
}

function submitBrief(e) {
  e.preventDefault();
  const input = document.getElementById('brief-input');
  const brief = input.value.trim();
  if (!brief) return false;
  fetch('/api/update', {
    method: 'POST',
    headers: {'Content-Type': 'application/json'},
    body: JSON.stringify({
      pipeline_running: true, current_topic: brief,
      agent: 'manager_agent', status: 'working',
      speech: 'New brief received! Reading...',
      log: 'Brief submitted: ' + brief,
    })
  });
  input.value = '';
  return false;
}

currentState = {{ state | tojson }};
renderAgents(currentState.agents);
renderLog(currentState.activity_log);
renderRuns(currentState.runs);
updatePipelineStatus(currentState);
setInterval(poll, 1500);
</script>
</body>
</html>
